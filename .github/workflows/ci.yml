name: CI

on:
   push:
      branches: [main]
   pull_request:
      branches: [main]

jobs:
   ci:
      runs-on: ubuntu-latest

      steps:
         - uses: actions/checkout@v4

         - uses: oven-sh/setup-bun@v2
           with:
              bun-version: latest

         - name: Install dependencies
           run: bun install

         - name: Lint
           run: bun lint

         - name: Typecheck
           run: bun typecheck

         - name: Test
           run: bun test
