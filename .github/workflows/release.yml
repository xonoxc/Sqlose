name: Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  release:
    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: apps/desktop
        run: |
          bun x tsc --noEmit
          bun x vite build
          bun x electron-builder --publish always

      - name: Upload AppImage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: apps/desktop/release/**/**/*.AppImage

  publish-aur:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        run: |
          echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
          echo "PKGVER=$(echo "${GITHUB_REF_NAME#v}" | sed 's/[^a-zA-Z0-9.]/_/g')" >> $GITHUB_ENV

      - uses: actions/download-artifact@v4
        with:
          name: linux-appimage
          path: /tmp/aur-pkg

      - name: Locate AppImage and calculate SHA256
        run: |
          APPIMAGE=$(find /tmp/aur-pkg -name "*.AppImage" | head -n1)
          if [ -z "$APPIMAGE" ]; then
            echo "ERROR: No AppImage found in downloaded artifact!"
            find /tmp/aur-pkg -type f
            exit 1
          fi
          echo "SHA256SUM=$(sha256sum "$APPIMAGE" | cut -d' ' -f1)" >> $GITHUB_ENV

      - name: Generate PKGBUILD from template
        run: |
          sed -e "s/{{PKGVER}}/${PKGVER}/g" \
              -e "s/{{VERSION}}/${VERSION}/g" \
              -e "s/{{SHA256SUM}}/${SHA256SUM}/g" \
              apps/desktop/packaging/aur/PKGBUILD.template > /tmp/aur-pkg/PKGBUILD

      - name: Generate .SRCINFO from template
        run: |
          sed -e "s/{{PKGVER}}/${PKGVER}/g" \
              -e "s/{{VERSION}}/${VERSION}/g" \
              -e "s/{{SHA256SUM}}/${SHA256SUM}/g" \
              apps/desktop/packaging/aur/.SRCINFO.template > /tmp/aur-pkg/.SRCINFO

      - name: Check AUR secret availability
        env:
          AUR_KEY: ${{ secrets.AUR_KEY }}
        run: |
          if [ -n "$AUR_KEY" ]; then
            echo "AUR_KEY secret is present and available."
          else
            echo "AUR_KEY secret is NOT set. AUR publishing will fail."
          fi

      - name: Setup SSH for AUR
        env:
          AUR_KEY: ${{ secrets.AUR_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf "%s\n" "$AUR_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -H aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config << 'EOF'
          Host aur.archlinux.org
            IdentityFile ~/.ssh/aur_key
            User aur
            StrictHostKeyChecking no
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config
          git config --global core.sshCommand "ssh -F ~/.ssh/config"

      - name: Check key exists
        run: |
          ls -la ~/.ssh
          ssh-keygen -y -f ~/.ssh/aur_key

      - name: Clone AUR repository
        run: |
          git clone aur@aur.archlinux.org:sqlose-bin.git /tmp/aur-repo

      - name: Update AUR package files
        working-directory: /tmp/aur-repo
        run: |
          cp /tmp/aur-pkg/PKGBUILD .
          cp /tmp/aur-pkg/.SRCINFO .
          git config user.name "xonoxc"
          git config user.email "xonoxc@://github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping AUR push."
          else
            git commit -m "Release v${VERSION}"
            git push
          fi
